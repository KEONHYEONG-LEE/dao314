<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPNR - Global Pi News Room</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --pi-color: #6d28d9;
            --bg-color: #ffffff;
            --sub-text: #999999;
        }
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
        }
        
        /* 0. 로그인 오버레이 스타일 */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--pi-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            color: white;
        }
        .login-btn {
            background: white;
            color: var(--pi-color);
            padding: 12px 40px;
            border-radius: 30px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }

        header {
            background-color: var(--pi-color);
            color: white;
            padding: 1rem;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        } 

        .category-container {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            background: white;
            padding: 12px 10px;
            border-bottom: 1px solid #eeeeee;
            -webkit-overflow-scrolling: touch;
            position: sticky;
            top: 54px;
            z-index: 99;
        }
        .category-container::-webkit-scrollbar { display: none; }
        
        .category-item {
            display: inline-block;
            padding: 8px 15px;
            margin-right: 8px;
            background: #f1f5f9;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #666;
            cursor: pointer;
        }
        .category-item.active {
            background: var(--pi-color);
            color: white;
        } 

        .news-section { background-color: white; min-height: 100vh; }
        
        .news-item {
            display: flex;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            align-items: center;
            cursor: pointer;
        } 

        .news-content { flex: 1; padding-right: 12px; } 

        .news-title {
            font-size: 0.95rem;
            font-weight: 500;
            color: #333;
            line-height: 1.4;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .news-title::before {
            content: "•";
            color: #ff4d4d;
            margin-right: 5px;
            font-weight: bold;
        } 

        .news-info { font-size: 0.8rem; color: var(--sub-text); } 

        .news-right-box { position: relative; width: 60px; height: 60px; } 

        .news-thumbnail {
            width: 60px; height: 60px;
            object-fit: cover;
            border-radius: 6px;
            background-color: #eee;
        } 

        .comment-badge {
            position: absolute;
            top: 0; right: -28px;
            width: 30px;
            font-size: 0.75rem;
            text-align: center;
            color: #666;
            line-height: 1.2;
        }
        
        .fab {
            position: fixed;
            bottom: 20px; right: 20px;
            background-color: #58a65c;
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            font-size: 0.8rem;
            text-align: center;
            cursor: pointer;
            line-height: 1;
        }
    </style>
</head>
<body> 

<div id="login-overlay">
    <h2>GPNR</h2>
    <p>파이오니어 인증이 필요합니다</p>
    <button class="login-btn" onclick="login()">Pi Network 로그인</button>
</div>

<header>GPNR (Global Pi News Room)</header> 

<div class="category-container" id="categoryBar"></div> 

<main class="news-section" id="newsList"></main> 

<div class="fab" onclick="handleSupportPayment()">Support<br>0.001π</div> 

<script>
    // Pi SDK 초기화 (항목 13을 위한 준비)
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false }); // 테스트 시 sandbox: true로 변경 가능

    const categories = [
        "전체", "Mainnet", "Global Community", "Commerce", "Social", "Education", 
        "Health", "Travel", "Utilities", "Career", "Entertainment", 
        "Games", "Finance", "Music", "Sports", "DeFi", "dApp", "NFT"
    ]; 

    const categoryBar = document.getElementById('categoryBar');
    const newsList = document.getElementById('newsList'); 

    // 카테고리 버튼 생성
    categories.forEach((cat, index) => {
        const div = document.createElement('div');
        div.className = 'category-item' + (index === 0 ? ' active' : '');
        div.innerText = cat;
        div.onclick = () => selectCategory(div, cat);
        categoryBar.appendChild(div);
    }); 

    // 0. 로그인 기능 구현
    async function login() {
        try {
            const scopes = ['payments', 'username'];
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            console.log("인증 성공:", auth);
            document.getElementById('login-overlay').style.display = 'none';
        } catch (err) {
            handleError(err);
        }
    }

    // 1 & 2. 결제 및 에러 핸들링 로직
    async function handleSupportPayment() {
        try {
            // 인증 먼저 점검
            const auth = await Pi.authenticate(['payments'], onIncompletePaymentFound);
            
            // 결제 생성
            Pi.createPayment({
                amount: 0.001,
                memo: "Support GPNR",
                metadata: { type: "support" },
            }, {
                onReadyForServerApproval: (paymentId) => { console.log("서버 승인 대기:", paymentId); },
                onReadyForServerCompletion: (paymentId, txid) => { alert("결제가 완료되었습니다!"); },
                onCancel: (paymentId) => { console.log("결제 취소"); },
                onError: (error, payment) => handleError(error)
            });
        } catch (err) {
            handleError(err);
        }
    }

    // 미결제 건 처리 콜백
    function onIncompletePaymentFound(payment) {
        console.log("미완료 결제 발견:", payment);
        // 여기에 서버로 결제 취소/완료 확인 요청을 보낼 수 있습니다.
    };

    // 항목 2: 에러 안내 로직
    function handleError(error) {
        if (error.type === "app_not_verified") {
            alert("⚠️ Pi Browser의 개발자 모드에서 도메인 승인이 필요합니다.");
        } else {
            console.error("오류 발생:", error);
        }
    }

    function selectCategory(element, name) {
        document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
        element.classList.add('active'); 
        
        // 항목 0: 요약된 페이지만 메인에 표시 (뉴스 상세 이동은 다음 스텝에서 구현)
        newsList.innerHTML = `
            <div class="news-item" onclick="alert('상세 뉴스는 다음 업데이트에서 활성화됩니다!')">
                <div class="news-content">
                    <h2 class="news-title">${name} 관련 최신 요약 뉴스입니다</h2>
                    <p class="news-info">GPNR AI • 1시간 전 조회 0</p>
                </div>
                <div class="news-right-box">
                    <img src="https://via.placeholder.com/60" class="news-thumbnail">
                    <div class="comment-badge">0<br>댓글</div>
                </div>
            </div>
        `;
    } 

    // 초기 로드
    // selectCategory(document.querySelector('.category-item'), '전체'); // 로그인 전에는 로드 안함
</script> 

</body>
</html>
