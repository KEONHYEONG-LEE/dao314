<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPNR (Global Pi News Room)</title>
    <meta name="pi-domain-verification" content="your-verification-code">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { 
            --primary-color: #6c5ce7; 
            --bg-color: #f4f7f6;
        }
        body { 
            font-family: 'Pretendard', sans-serif; 
            margin: 0; 
            background-color: var(--bg-color); 
            color: #333;
        }
        header { 
            background: #1a237e; 
            color: white; 
            padding: 20px 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .category-wrapper { 
            overflow-x: auto; 
            white-space: nowrap;
            padding: 10px 5px;
            background: #fff;
            border-bottom: 1px solid #ddd;
        }
        .category-btn { 
            display: inline-block; 
            padding: 8px 15px;
            margin: 0 5px;
            border-radius: 20px;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        .category-btn.active { 
            background: var(--primary-color); 
            color: white; 
            border-color: var(--primary-color);
        }
        .container { padding: 15px; }
        .card { 
            background: white; 
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .card-body { padding: 15px; }
        .source-tag { 
            font-size: 0.7rem; 
            color: var(--primary-color); 
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        .card-title { 
            font-size: 1.1rem; 
            margin: 0 0 8px 0;
            line-height: 1.4;
        }
        .card-desc { 
            font-size: 0.9rem; 
            color: #666;
            line-height: 1.5;
            margin: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1 style="margin:0; font-size: 1.5rem;">GPNR</h1>
        <p style="margin:5px 0 0 0; font-size: 0.8rem; opacity: 0.8;">Global Pi News Room</p>
    </header>

    <div class="category-wrapper">
        <div class="category-btn active">전체</div>
        <div class="category-btn">Pi Network</div>
        <div class="category-btn">Global News</div>
        <div class="category-btn">GCV Trend</div>
    </div>

    <div class="container" id="news-list">
        <div class="card">
            <div class="card-body">
                <span class="source-tag">Pi News</span>
                <h3 class="card-title">GPNR 서비스가 성공적으로 연결되었습니다</h3>
                <p class="card-desc">이제 Pi 브라우저에서 GPNR의 실시간 소식을 만나보실 수 있습니다.</p>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <span class="source-tag">Ecosystem</span>
                <h3 class="card-title">글로벌 파이 생태계 업데이트</h3>
                <p class="card-desc">전 세계 파이 노드 및 커뮤니티의 주요 변화를 확인하세요.</p>
            </div>
        </div>
    </div>

    <script>
        // Pi SDK 초기화
        try {
            Pi.init({ version: "2.0", sandbox: false });
            console.log("Pi SDK Initialized");
        } catch (err) {
            console.error("Pi SDK Load Failed", err);
        }
    </script>
</body>
</html>
