<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPNR - Global Pi News Room</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --pi-color: #6d28d9;
            --bg-color: #ffffff;
            --sub-text: #999999;
        }
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
            overflow-x: hidden;
        }
        
        /* 0. 로그인 오버레이 */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--pi-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            color: white;
            text-align: center;
        }
        .login-btn {
            background: white;
            color: var(--pi-color);
            padding: 14px 50px;
            border-radius: 30px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header {
            background-color: var(--pi-color);
            color: white;
            padding: 1rem;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        } 

        .category-container {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            background: white;
            padding: 12px 10px;
            border-bottom: 1px solid #eeeeee;
            -webkit-overflow-scrolling: touch;
            position: sticky;
            top: 54px; /* header 높이 기준 */
            z-index: 99;
        }
        .category-container::-webkit-scrollbar { display: none; }
        
        .category-item {
            display: inline-block;
            padding: 8px 18px;
            margin-right: 8px;
            background: #f1f5f9;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            transition: 0.2s;
        }
        .category-item.active {
            background: var(--pi-color);
            color: white;
        } 

        .news-section { background-color: white; min-height: 100vh; }
        
        .news-item {
            display: flex;
            padding: 18px 15px;
            border-bottom: 1px solid #f8f8f8;
            align-items: flex-start;
            cursor: pointer;
        } 

        .news-content { flex: 1; padding-right: 15px; } 

        .news-title {
            font-size: 1rem;
            font-weight: 600;
            color: #222;
            line-height: 1.5;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-info { font-size: 0.8rem; color: var(--sub-text); display: flex; align-items: center; gap: 8px; } 

        .news-thumbnail {
            width: 75px; height: 75px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #f0f0f0;
        } 
        
        /* 플로팅 버튼 (결제) */
        .fab {
            position: fixed;
            bottom: 25px; right: 20px;
            background-color: #22c55e;
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-size: 0.8rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            line-height: 1.2;
            z-index: 500;
        }
    </style>
</head>
<body> 

<div id="login-overlay">
    <h1 style="font-size: 2.5rem; margin-bottom: 5px;">GPNR</h1>
    <p style="opacity: 0.9;">Global Pi News Room</p>
    <p style="margin-top: 30px; font-size: 0.9rem;">계속하려면 파이오니어 인증이 필요합니다</p>
    <button class="login-btn" onclick="login()">Pi Network 로그인</button>
</div>

<header>GPNR News</header> 

<div class="category-container" id="categoryBar"></div> 

<main class="news-section" id="newsList">
    </main> 

<div class="fab" onclick="handleSupportPayment()">Support<br>0.001π</div> 

<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false }); // 상용 서비스 시 false 유지

    const categories = [
        "전체", "Mainnet", "Global Community", "Commerce", "Social", "Education", 
        "Health", "Travel", "Utilities", "Career", "Entertainment", 
        "Games", "Finance", "Music", "Sports", "DeFi", "dApp", "NFT"
    ]; 

    const categoryBar = document.getElementById('categoryBar');
    const newsList = document.getElementById('newsList'); 

    // 카테고리 생성
    categories.forEach((cat, index) => {
        const div = document.createElement('div');
        div.className = 'category-item' + (index === 0 ? ' active' : '');
        div.innerText = cat;
        div.onclick = () => selectCategory(div, cat);
        categoryBar.appendChild(div);
    }); 

    // 0. 로그인 로직 (인증 완료 시 메인 노출)
    async function login() {
        try {
            const scopes = ['payments', 'username'];
            // onIncompletePaymentFound를 여기서도 호출하여 멈춘 결제 해결 (항목 1)
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            
            console.log("Welcome,", auth.user.username);
            document.getElementById('login-overlay').style.display = 'none';
            
            // 첫 로드 (전체 카테고리)
            selectCategory(document.querySelector('.category-item'), '전체');
        } catch (err) {
            handleError(err);
        }
    }

    // 1 & 2. 결제 로직 수정
    async function handleSupportPayment() {
        try {
            // 결제 전 인증 상태 재점검
            await Pi.authenticate(['payments'], onIncompletePaymentFound);
            
            await Pi.createPayment({
                amount: 0.001,
                memo: "Support GPNR",
                metadata: { type: "support_donation" },
            }, {
                onReadyForServerApproval: (paymentId) => { 
                    console.log("Server Approval Required:", paymentId); 
                    // 여기에 백엔드 서버 승인 API 호출(fetch) 필요
                },
                onReadyForServerCompletion: (paymentId, txid) => { 
                    alert("소중한 후원 감사합니다! (TXID: " + txid.substring(0,10) + "...)"); 
                },
                onCancel: (paymentId) => { console.log("결제 취소됨"); },
                onError: (error, payment) => handleError(error)
            });
        } catch (err) {
            handleError(err);
        }
    }

    // 항목 1: 미결제 건 처리 (중요)
    function onIncompletePaymentFound(payment) {
        console.log("미완료 결제 건을 발견했습니다:", payment.identifier);
        // 실제 운영 시: 백엔드에 이 payment.identifier를 보내서 완료/취소 상태를 동기화해야 함
    };

    // 항목 2: 에러 핸들링 (경고 우회 및 안내)
    function handleError(error) {
        if (error.type === "app_not_verified" || error.message?.includes("verified")) {
            alert("⚠️ 안내: Pi Browser의 '개발자 모드'에서 해당 도메인 승인이 필요합니다. 승인 후 다시 시도해주세요.");
        } else if (error.type === "user_cancelled") {
            // 유저가 직접 취소한 경우는 조용히 로그만 남김
            console.log("User cancelled the action.");
        } else {
            alert("시스템 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
            console.error("Error Detail:", error);
        }
    }

    // 항목 0: 메인 화면 요약 리스트 노출
    function selectCategory(element, name) {
        document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
        element.classList.add('active'); 
        
        // 실제 데이터 수집 전 샘플 레이아웃 (항목 0 반영)
        newsList.innerHTML = `
            <div class="news-item" onclick="viewDetail('${name}')">
                <div class="news-content">
                    <h2 class="news-title">[${name}] 파이 네트워크의 새로운 소식 요약</h2>
                    <div class="news-info">
                        <span>GPNR AI 어시스턴트</span>
                        <span>•</span>
                        <span>1시간 전</span>
                    </div>
                </div>
                <img src="https://via.placeholder.com/80" class="news-thumbnail">
            </div>
        `.repeat(5); // 임시로 5개 출력
    } 

    function viewDetail(category) {
        // 항목 0: 클릭 시 상세 내용 탐색 로직 (추후 구현)
        alert(category + " 뉴스의 상세 내용을 불러오는 중입니다. (상세 페이지 업데이트 예정)");
    }
</script> 

</body>
</html>
